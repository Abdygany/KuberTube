services:
  postgres:
    image: postgres:16-alpine
    container_name: learnspace-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: learnspace
      POSTGRES_PASSWORD: learnspace
      POSTGRES_DB: learnspace
    ports:
      - '5432:5432'
    volumes:
      - learnspace-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U learnspace -d learnspace']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  learnspace-pgdata:
